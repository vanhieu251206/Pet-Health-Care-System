{% include 'partials/header.html' %}
<div class="flex flex-col items-center max-w-screen-2xl w-full mx-auto mb-10">
    <!-- Nội dung của bạn ở đây -->
</div>

    <!-- Sidebar -->
    {% include 'partials/sidebar.html' %}
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thêm Hồ Sơ Mới - Hệ Thống Chăm Sóc Sức Khỏe Thú Cưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body class="font-roboto bg-green-100">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4 text-green-800">
            <i class="fas fa-paw mr-2"></i> Thêm Hồ Sơ Mới
        </h1>
        <div class="bg-white shadow-md rounded-lg p-6 mb-6">
            <form id="petForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="ownerName"><i class="fas fa-user mr-2"></i>Tên Chủ Nhân</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="ownerName" placeholder="Nhập tên chủ nhân" type="text"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="ownerPhone"><i class="fas fa-phone mr-2"></i>Số Điện Thoại</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="ownerPhone" placeholder="Nhập số điện thoại" type="text"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="ownerEmail"><i class="fas fa-envelope mr-2"></i>Email</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="ownerEmail" placeholder="Nhập email" type="email"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="petName"><i class="fas fa-dog mr-2"></i>Tên Thú Cưng</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="petName" placeholder="Nhập tên thú cưng" type="text"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="petType"><i class="fas fa-paw mr-2"></i>Loại Thú Cưng</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="petType" placeholder="Nhập loại thú cưng" type="text"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="petAge"><i class="fas fa-birthday-cake mr-2"></i>Tuổi Thú Cưng</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="petAge" placeholder="Nhập tuổi thú cưng" type="number"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="medicalHistory"><i class="fas fa-file-medical-alt mr-2"></i>Hồ Sơ Bệnh</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="medicalHistory" placeholder="Nhập hồ sơ bệnh" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="symptoms"><i class="fas fa-stethoscope mr-2"></i>Triệu Chứng</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="symptoms" placeholder="Nhập triệu chứng" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="diagnosis"><i class="fas fa-diagnoses mr-2"></i>Chẩn Đoán</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="diagnosis" placeholder="Nhập chẩn đoán" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="treatment"><i class="fas fa-pills mr-2"></i>Điều Trị</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="treatment" placeholder="Nhập điều trị" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="prescription"><i class="fas fa-prescription-bottle-alt mr-2"></i>Kê Đơn Thuốc</label>
                    <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="prescription" placeholder="Nhập kê đơn thuốc" rows="4"></textarea>
                </div>
                <div class="flex items-center justify-between">
                    <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" onclick="saveProfile(event)" type="button"><i class="fas fa-save mr-2"></i>Lưu Hồ Sơ</button>
                    <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" onclick="resetForm(event)" type="button"><i class="fas fa-times mr-2"></i>Hủy Bỏ</button>
                </div>
            </form>
        </div>
        <h2 class="text-2xl font-bold mb-4 text-green-800"><i class="fas fa-list mr-2"></i>Danh Sách Hồ Sơ Đã Lưu</h2>
        <div class="bg-white shadow-md rounded-lg p-6">
            <ul id="profileList"></ul>
        </div>
    </div>
    <script>
        let profileCount = 0;

        function saveProfile(event) {
            event.preventDefault();

            const ownerName = document.getElementById('ownerName').value;
            const ownerPhone = document.getElementById('ownerPhone').value;
            const ownerEmail = document.getElementById('ownerEmail').value;
            const petName = document.getElementById('petName').value;
            const petType = document.getElementById('petType').value;
            const petAge = document.getElementById('petAge').value;
            const medicalHistory = document.getElementById('medicalHistory').value;
            const symptoms = document.getElementById('symptoms').value;
            const diagnosis = document.getElementById('diagnosis').value;
            const treatment = document.getElementById('treatment').value;
            const prescription = document.getElementById('prescription').value;

            profileCount++;

            const profileList = document.getElementById('profileList');

            const profileItem = document.createElement('li');
            profileItem.classList.add('border-b', 'mb-4', 'pb-4', 'cursor-pointer');
            profileItem.setAttribute('onclick', `toggleDetails(${profileCount})`);
            profileItem.setAttribute('id', `profile-${profileCount}`);

            profileItem.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-bold">STT: ${profileCount}</span>
                    <span>${ownerName} - ${petName} (${petType})</span>
                </div>
                <div id="details-${profileCount}" class="hidden mt-4">
                    <h3 class="text-xl font-semibold text-green-700"><i class="fas fa-user mr-2"></i>Thông Tin Chủ Nhân</h3>
                    <p><i class="fas fa-user mr-2"></i>Tên: ${ownerName}</p>
                    <p><i class="fas fa-phone mr-2"></i>Số điện thoại: ${ownerPhone}</p>
                    <p><i class="fas fa-envelope mr-2"></i>Email: ${ownerEmail}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-dog mr-2"></i>Thông Tin Thú Cưng</h3>
                    <p><i class="fas fa-dog mr-2"></i>Tên: ${petName}</p>
                    <p><i class="fas fa-paw mr-2"></i>Loại: ${petType}</p>
                    <p><i class="fas fa-birthday-cake mr-2"></i>Tuổi: ${petAge}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-file-medical-alt mr-2"></i>Hồ Sơ Bệnh</h3>
                    <p>${medicalHistory}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-stethoscope mr-2"></i>Triệu Chứng</h3>
                    <p>${symptoms}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-diagnoses mr-2"></i>Chẩn Đoán</h3>
                    <p>${diagnosis}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-pills mr-2"></i>Điều Trị</h3>
                    <p>${treatment}</p>
                    <h3 class="text-xl font-semibold text-green-700 mt-4"><i class="fas fa-prescription-bottle-alt mr-2"></i>Kê Đơn Thuốc</h3>
                    <p>${prescription}</p>
                </div>
            `;

            profileList.appendChild(profileItem);

            document.getElementById('petForm').reset();
        }

        function resetForm(event) {
            event.preventDefault();
            document.getElementById('petForm').reset();
        }

        function toggleDetails(profileId) {
            const details = document.getElementById(`details-${profileId}`);
            if (details.classList.contains('hidden')) {
                details.classList.remove('hidden');
            } else {
                details.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
