{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Pet Health Care System{% endblock page_title %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="flex">
        <!-- Sidebar -->
        {% include "partials/sidebar.html" %}

        <!-- Main Content -->
        <div class="flex-1 p-6">
            <div class="bg-green-700 text-white p-4 rounded">
                <div class="flex justify-between items-center">
                    <!-- Phần tiêu đề có thể thay đổi -->
                    <h1 class="text-xl font-bold">
                        {% block page_header %}Trang tổng quan{% endblock %}
                    </h1>
            
                    <!-- Phần ảnh đại diện và tên người dùng luôn cố định ở bên phải -->
                    <div class="flex items-center">
                        <span class="mr-2">
                            Xin chào,
                        </span>
                        <img alt="User avatar" class="h-10 w-10 rounded-full" height="40" src="https://storage.googleapis.com/a1aa/image/CVc7dBVUTpjqiuz0csBsD6gLEGEKo_RtgVYQwp04Yec.jpg" width="40"/>
                    </div>
                </div>
            </div>
            
            <!-- Nội dung động -->
            <div class="content">
                {% block content %}{% endblock content %}
            </div>
        </div>
    </div>
</body>
</html>
