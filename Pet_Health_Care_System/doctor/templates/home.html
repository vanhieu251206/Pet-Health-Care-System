{% extends 'base.html' %}
{% load static %}
{% block content %}
   <!-- Main Content -->
   <main class="w-full bg-white rounded-lg shadow-lg p-4 mt-4">
    <h2 class="text-2xl mb-4 text-center">
     Thông tin cơ bản của bác sĩ
    </h2>
    <div class="flex flex-col items-center mb-4">
     <div class="border-4 border-green-600 rounded-lg p-2 mb-4">
      <img alt="User Avatar" class="rounded-lg" height="150" src="https://storage.googleapis.com/a1aa/image/Z2bQuMNTgWuMAUyGY9OHPXzkBJClNb5vzRYQjXuEDy8.jpg" width="150"/>
     </div>
     <div class="w-full max-w-md">
      <p class="text-lg flex items-center mb-2">
       <i class="fas fa-user mr-2 text-green-600">
       </i>
       <strong>
        Tên:
       </strong>
       <span class="ml-2">
        Tên người dùng
       </span>
      </p>
      <p class="text-lg flex items-center mb-2">
       <i class="fas fa-envelope mr-2 text-green-600">
       </i>
       <strong>
        Email:
       </strong>
       <span class="ml-2">
        user@example.com
       </span>
      </p>
      <p class="text-lg flex items-center mb-2">
       <i class="fas fa-phone-alt mr-2 text-green-600">
       </i>
       <strong>
        Số điện thoại:
       </strong>
       <span class="ml-2">
        0123456789
       </span>
      </p>
      <p class="text-lg flex items-center mb-2">
       <i class="fas fa-briefcase mr-2 text-green-600">
       </i>
       <strong>
        Chức vụ:
       </strong>
       <span class="ml-2">
        Bác sĩ 
       </span>
      </p>
      <p class="text-lg flex items-center mb-2">
       <i class="fas fa-id-badge mr-2 text-green-600">
       </i>
       <strong>
        Mã bác sĩ:
       </strong>
       <span class="ml-2">
        123456
       </span>
      </p>
     </div>
    </div>
   </main>
  </div>
  {% endblock %}
