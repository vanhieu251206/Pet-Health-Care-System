<!-- Sidebar Toggle Button -->
<button class="bg-green-600 text-white p-2 rounded-full hover:bg-green-700 fixed top-20 left-4 z-50" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>
  
  <!-- Sidebar -->
  <aside class="w-1/5 bg-white rounded-lg shadow-lg p-4 fixed top-20 left-16 hidden transition-all duration-300 ease-in-out" id="sidebar">
    <div class="text-center mb-4">
        <button class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 w-full" onclick="window.location.href='{% url 'home' %}';">
            Home
        </button>
    </div>
    <div class="text-center mb-4">
        <button class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 w-full" onclick="window.location.href='/infor_view';">
            Xem thông tin Pet
        </button>
    </div>
    <div class="text-center mb-4">
        <button class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 w-full" onclick="window.location.href='/update';">
            Thêm hồ sơ Pet mớimới
        </button>
    </div>
    <div class="text-center mb-4">
        <button class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 w-full" onclick="window.location.href='/Calendar_doctor';">
            Lịch làm việc 
        </button>
    </div>
  </aside>
  
  <!-- JavaScript -->
  <script>
  function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("hidden");
  }
  </script>
