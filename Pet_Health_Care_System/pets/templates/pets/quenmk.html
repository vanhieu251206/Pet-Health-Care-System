<html>
<head>
    <title>Quên Mật Khẩu - Pet Health Care System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body class="bg-orange-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Quên Mật Khẩu</h2>
        <p class="text-gray-600 mb-6">Vui lòng nhập địa chỉ email của bạn để nhận liên kết đặt lại mật khẩu.</p>
        <form>
            <input type="email" placeholder="Nhập địa chỉ email của bạn" required class="w-full p-3 border border-gray-300 rounded mb-4">
            <button type="submit" class="w-full p-3 bg-orange-500 text-white font-bold rounded hover:bg-orange-600">
                Gửi Liên Kết Đặt Lại Mật Khẩu
            </button>
        </form>
        <a href="/login" class="block text-center text-orange-500 mt-6 hover:underline">
            <i class="fas fa-arrow-left"></i> Quay lại trang đăng nhập
        </a>
    </div>
</body>
</html>
