<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Health Care System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="font-roboto bg-gray-100 flex flex-col min-h-screen">
    <header class="bg-orange-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Pet Health Care System</h1>
            <nav>
                <ul class="flex space-x-4">
                    <!-- Sử dụng href để chuyển hướng đến trang Đăng Ký -->
                    <li><a href="/dangki" class="hover:underline">Đăng Ký</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-16">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Đăng Nhập</h2>
            <form class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Địa Chỉ Email</label>
                    <input type="email" id="email" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="nguyenvana@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Mật Khẩu</label>
                    <input type="password" id="password" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="********">
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember_me" type="checkbox" class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300 rounded">
                        <label for="remember_me" class="ml-2 block text-sm text-gray-900">Nhớ Mật Khẩu</label>
                    </div>
                    <div class="text-sm">
                        <a href="/quenmk" class="font-medium text-orange-600 hover:text-orange-500">Quên Mật Khẩu?</a>
                    </div>
                </div>
                <button type="submit" class="w-full bg-orange-600 text-white p-2 rounded-md hover:bg-orange-700">Đăng Nhập</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">
                Chưa có tài khoản? <a href="/dangki" class="font-medium text-orange-600 hover:text-orange-500">Đăng Ký</a>
            </p>
        </div>
    </main>

    <footer class="bg-orange-600 text-white p-4 mt-8">
        <div class="container mx-auto text-center">
            <p>&copy; Hệ thống chăm sóc sức khỏe thú cưng. Bảo lưu mọi quyền.</p>
            <div class="flex justify-center space-x-4 mt-2">
                <a href="#" class="hover:text-gray-400"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="hover:text-gray-400"><i class="fab fa-twitter"></i></a>
                <a href="#" class="hover:text-gray-400"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-gray-400"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
        <div class="container mx-auto text-center mt-4">
            <p>Địa chỉ: 123 Đường ABC, Quận 1, TP. Hồ Chí Minh</p>
            <p>Điện thoại: (0123) 456-789</p>
            <p>Email: info@chamsocchocung.com</p>
        </div>
    </footer>
</body>
</html>
