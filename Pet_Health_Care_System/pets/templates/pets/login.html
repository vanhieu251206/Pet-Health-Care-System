<html>
 <head>
  <title>
   Login - Pet Care System
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
        }
  </style>
 </head>
 <body class="bg-orange-100">
  <div class="min-h-screen flex flex-col items-center justify-center">
   <!-- Navigation -->
   <nav class="w-full bg-white shadow-md py-4">
    <div class="container mx-auto flex justify-between items-center px-4">
     <a class="flex items-center text-2xl font-bold text-orange-800" href="#">
      <img alt="Logo of a pet care system with a paw print and heart" class="h-10 w-10 mr-2" height="50" src="https://storage.googleapis.com/a1aa/image/c2LOt7N5AjLkHBUAfkNsYaiaNvy98eilEY3gSZ7fUV78idOoA.jpg" width="50"/>
      Pet Health Care System
     </a>
     <div>
      <a class="text-orange-600 hover:text-orange-800 mx-2" href="/dangki">
        Đăng kí
      </a> 
     </div>
    </div>
   </nav>
   <!-- Login Form -->
   <div class="w-full max-w-md bg-white shadow-md rounded-lg p-8 mt-8" id="login">
    <h2 class="text-2xl font-bold text-orange-800 mb-6">
     Đăng nhập
    </h2>
    <form>
     <div class="mb-4">
      <label class="block text-orange-700">
       Email
      </label>
      <input class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="Enter your email" type="email"/>
     </div>
     <div class="mb-4">
      <label class="block text-orange-700">
       Mật khẩu
      </label>
      <input class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="Enter your password" type="password"/>
     </div>
     <div class="flex items-center justify-between mb-4">
      <div>
       <input class="mr-2" id="remember" type="checkbox"/>
       <label class="text-orange-700" for="remember">
        ghi nhớ mật khẩu 
       </label>
      </div>
      <a class="text-orange-500 hover:underline" href="/quenmk">
        Quên mật khẩu
      </a> 
     </div>
     <button class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600" type="submit">
      Đăng nhập 
     </button>
    </form>
   </div>
  </div>
 </body>
 <footer class="bg-orange-500 text-white p-4 mt-8">
    <div class="container mx-auto text-center">
     <h3 class="text-xl font-bold">
      Liên Hệ Ngay
     </h3>
     <p class="mt-2">
      Địa chỉ: 123 Đường ABC, Quận 1, TP. Hồ Chí Minh
     </p>
     <p class="mt-2">
      Điện thoại: 0123 456 789
     </p>
     <p class="mt-2">
      Email: contact@thucungcare.vn
     </p>
     <div class="mt-4">
      <a class="text-white mx-2" href="#">
       <i class="fab fa-facebook-f">
       </i>
      </a>
      <a class="text-white mx-2" href="#">
       <i class="fab fa-twitter">
       </i>
      </a>
      <a class="text-white mx-2" href="#">
       <i class="fab fa-instagram">
       </i>
      </a>
     </div>
    </div>
   </footer>
</html>
