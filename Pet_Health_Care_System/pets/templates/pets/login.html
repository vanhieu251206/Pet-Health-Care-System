<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-blue-500 to-blue-300">
    <div class="bg-white p-8 rounded-lg shadow-lg w-80">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Sign In</h2>
        <form>
            <div class="mb-4">
                <input type="text" placeholder="Username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4 relative">
                <input type="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-eye absolute right-3 top-3 text-gray-500"></i>
            </div>
            <div class="mb-4">
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Login</button>
            </div>
        </form>
        <div class="text-center">
            <a href="{% url "quenmk" %}" class="text-blue-600 hover:underline">Quên mật khẩu?</a>
        </div>
        <div class="text-center mt-2">
            <a href="#" class="text-blue-600 hover:underline">Create an Account?</a>
        </div>
    </div>
</body>
</html>
