<html lang="vi">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Đăng Ký - Hệ Thống Chăm Sóc Thú Cưng
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
        }
  </style>
 </head>
 <body class="bg-orange-100">
  <header class="bg-orange-500 text-white p-4">
   <div class="container mx-auto flex justify-between items-center">
    <h1 class="text-2xl font-bold">
     Hệ Thống Chăm Sóc Thú Cưng
    </h1>
    <nav>
     <ul class="flex space-x-4">
     
     </ul>
    </nav>
   </div>
  </header>
  <main class="container mx-auto p-4">
   <section class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg mt-8">
    <h2 class="text-2xl font-bold text-orange-700 text-center">
     Đăng Ký
    </h2>
    <form class="mt-4">
     <div class="mb-4">
      <label class="block text-gray-700" for="name">
       Họ và Tên
      </label>
      <input class="w-full p-2 border border-gray-300 rounded mt-1" id="name" name="name" type="text"/>
     </div>
     <div class="mb-4">
      <label class="block text-gray-700" for="email">
       Email
      </label>
      <input class="w-full p-2 border border-gray-300 rounded mt-1" id="email" name="email" type="email"/>
     </div>
     <div class="mb-4">
      <label class="block text-gray-700" for="password">
       Mật Khẩu
      </label>
      <input class="w-full p-2 border border-gray-300 rounded mt-1" id="password" name="password" type="password"/>
     </div>
     <div class="mb-4">
      <label class="block text-gray-700" for="confirm-password">
       Xác Nhận Mật Khẩu
      </label>
      <input class="w-full p-2 border border-gray-300 rounded mt-1" id="confirm-password" name="confirm-password" type="password"/>
     </div>
     <div class="text-center mt-4">
      <button class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600" type="submit">
       Đăng Ký
      </button>
     </div>
    </form>
    <div class="text-center mt-4">
     <p class="text-gray-700">
      Đã có tài khoản? <a class="text-orange-500 hover:underline" href="#">Đăng Nhập</a>
     </p>
    </div>
   </section>
  </main>
  <footer class="bg-orange-500 text-white p-4 mt-8">
    <div class="container mx-auto text-center">
     <h3 class="text-xl font-bold">
      Liên Hệ Ngay
     </h3>
     <p class="mt-2">
      Địa chỉ: 123 Đường ABC, Quận 1, TP. Hồ Chí Minh
     </p>
     <p class="mt-2">
      Điện thoại: 0123 456 789
     </p>
     <p class="mt-2">
      Email: contact@thucungcare.vn
     </p>
     <div class="mt-4">
      <a class="text-white mx-2" href="#">
       <i class="fab fa-facebook-f">
       </i>
      </a>
      <a class="text-white mx-2" href="#">
       <i class="fab fa-twitter">
       </i>
      </a>
      <a class="text-white mx-2" href="#">
       <i class="fab fa-instagram">
       </i>
      </a>
     </div>
    </div>
   </footer>
 </body>
</html>
