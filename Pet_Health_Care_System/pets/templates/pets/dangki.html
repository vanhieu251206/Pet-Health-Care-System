<html>
<head>
    <title>Đăng Kí - Hệ Thống Chăm Sóc Thú Cưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body class="bg-orange-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Đăng Kí</h2>
        <form>
            <div class="mb-4">
                <label for="name" class="block text-gray-700 mb-2">Họ và Tên</label>
                <input type="text" id="name" placeholder="Nhập họ và tên của bạn" required class="w-full p-3 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 mb-2">Email</label>
                <input type="email" id="email" placeholder="Nhập địa chỉ email của bạn" required class="w-full p-3 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="password" class="block text-gray-700 mb-2">Mật Khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu của bạn" required class="w-full p-3 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="confirm-password" class="block text-gray-700 mb-2">Xác Nhận Mật Khẩu</label>
                <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu của bạn" required class="w-full p-3 border border-gray-300 rounded">
            </div>
            <button type="submit" class="w-full p-3 bg-orange-500 text-white font-bold rounded hover:bg-orange-600">Đăng Kí</button>
        </form>
        <p class="text-center text-gray-600 mt-6">
            Đã có tài khoản? 
            <a href="/login" class="text-orange-500 hover:underline">Đăng nhập</a>
        </p>
    </div>
</body>
</html>
